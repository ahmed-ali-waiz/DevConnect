# Project dev: use this folder (no admin). For the Windows service DB instead, run as Administrator: net start MongoDB
# (service uses C:\Program Files\MongoDB\Server\8.2\data — do not run both on 27017 at once.)

storage:
  dbPath: "D:/Social_Media_App/server/mongodb-data"
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.25

systemLog:
  destination: file
  logAppend: true
  path: D:\Social_Media_App\server\mongodb-logs\mongod.log

net:
  port: 27017
  bindIp: 127.0.0.1
